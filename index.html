<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TED Speech Finder</title>
    <meta name="description" content="日本語・英語の人気スピーチ各100件から、10個の質問でおすすめの講演を提案する静的Webアプリ。" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="TED Speech Finder" />
    <meta property="og:description" content="日本語・英語の人気スピーチ各100件から、10個の質問でおすすめ講演を提案。" />
    <meta property="og:image" content="assets/ogp-image.svg" />
    <meta property="og:locale" content="ja_JP" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TED Speech Finder" />
    <meta name="twitter:description" content="日本語・英語の人気スピーチ各100件から、10個の質問でおすすめ講演を提案。" />
    <meta name="twitter:image" content="assets/ogp-image.svg" />

    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>TED Speech Finder</h1>
        <p>日本語・英語の人気スピーチ各100件から、10個の質問であなた向けにおすすめします。</p>
      </header>

      <section class="panel settings">
        <h2>1. 言語を選択</h2>
        <label>
          <input type="radio" name="lang" value="ja" checked /> 日本語
        </label>
        <label>
          <input type="radio" name="lang" value="en" /> English
        </label>
        <button id="startBtn">質問を始める</button>
      </section>

      <section class="panel quiz hidden" id="quizPanel">
        <h2>2. 10個の質問に回答</h2>
        <p id="progress"></p>
        <h3 id="questionText"></h3>
        <div id="choices" class="choices"></div>
      </section>

      <section class="panel result hidden" id="resultPanel">
        <h2>3. おすすめ結果</h2>
        <p id="summary"></p>
        <ol id="recommendations"></ol>
        <button id="retryBtn">もう一度やる</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
